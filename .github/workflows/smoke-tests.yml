name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Bootstrap project
        run: bash setup.sh

      - name: Run ARC smoke tests
        run: uv run python scripts/smoke_test.py
